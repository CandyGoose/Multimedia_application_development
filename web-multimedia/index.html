<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Галерея изображений — Web Multimedia</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <h1>Галерея изображений</h1>
      <p class="subtitle">Интерактивная веб-мультимедиа галерея с аудио-визуализацией</p>
    </header>

    <main class="app-main">
      <section class="gallery-panel" aria-label="Галерея изображений">
        <div class="gallery-frame">
          <figure class="slide active" data-index="0">
            <img src="images/aurora.svg" alt="Северное сияние" width="400" height="300">
            <figcaption>Северное сияние — абстрактная композиция в холодных оттенках с волнами света.</figcaption>
          </figure>
          <figure class="slide" data-index="1">
            <img src="images/geometric.svg" alt="Геометрическая гармония" width="400" height="300">
            <figcaption>Геометрическая гармония — пересечение треугольников, кругов и линий в контрастных цветах.</figcaption>
          </figure>
          <figure class="slide" data-index="2">
            <img src="images/waves.svg" alt="Морские волны" width="400" height="300">
            <figcaption>Морские волны — многослойный пейзаж с солнцем и плавными синими волнами.</figcaption>
          </figure>
          <figure class="slide" data-index="3">
            <img src="images/forest.svg" alt="Лесной рассвет" width="400" height="300">
            <figcaption>Лесной рассвет — силуэты сосен на фоне зелёного неба и утреннего солнца.</figcaption>
          </figure>
          <figure class="slide" data-index="4">
            <img src="images/nebula.svg" alt="Космическая туманность" width="400" height="300">
            <figcaption>Космическая туманность — цветные облака и звёзды в глубине космоса.</figcaption>
          </figure>

          <div class="slide-counter" id="slideCounter">1 / 5</div>
        </div>

        <div class="gallery-controls">
          <button type="button" class="btn btn-nav" id="btnPrev" aria-label="Предыдущее изображение">&#9664;</button>
          <div class="dots" id="dotsNav" role="tablist" aria-label="Навигация по слайдам"></div>
          <button type="button" class="btn btn-nav" id="btnNext" aria-label="Следующее изображение">&#9654;</button>
        </div>

        <div class="timing-panel">
          <label for="timingRange">Интервал автопереключения: <span id="timingValue">4</span> сек</label>
          <input type="range" id="timingRange" min="2" max="12" step="1" value="4">
          <button type="button" class="btn btn-toggle" id="btnAuto" aria-pressed="true">Авто: вкл</button>
        </div>
      </section>

      <aside class="audio-panel" aria-label="Управление звуком">
        <h2>Звуковое сопровождение</h2>

        <audio id="my_audio" preload="auto" src="audio/ambient-flow.wav" loop controls></audio>
        <p class="audio-hint" id="audioHint"></p>

        <div class="audio-controls">
          <label class="toggle-sound">
            <input type="checkbox" id="soundEnabled" checked>
            <span class="toggle-track"></span>
            <span>Звук включён</span>
          </label>

          <fieldset class="track-list">
            <legend>Выбор дорожки</legend>
            <label><input type="radio" name="track" value="audio/ambient-flow.wav" checked> Ambient Flow</label>
            <label><input type="radio" name="track" value="audio/digital-pulse.wav"> Digital Pulse</label>
            <label><input type="radio" name="track" value="audio/cosmic-arpeggio.wav"> Cosmic Arpeggio</label>
            <label class="upload-label">
              <input type="file" id="audioUpload" accept="audio/*">
              Загрузить свой файл
            </label>
          </fieldset>

          <div class="playback-bar">
            <button type="button" class="btn" id="btnPlayPause">Воспроизвести</button>
            <span id="trackName">Ambient Flow</span>
          </div>
        </div>

        <div class="viz-container">
          <h3>Аудио-визуализация</h3>
          <svg id="audioViz" viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <radialGradient id="shellGrad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffd166"/>
                <stop offset="60%" stop-color="#e94560"/>
                <stop offset="100%" stop-color="#00f5a0" stop-opacity="0"/>
              </radialGradient>
              <radialGradient id="orbGradA" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#00d9f5"/>
                <stop offset="100%" stop-color="#00d9f5" stop-opacity="0"/>
              </radialGradient>
              <radialGradient id="orbGradB" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#e94560"/>
                <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
              </radialGradient>
              <radialGradient id="orbGradC" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffd166"/>
                <stop offset="100%" stop-color="#ffd166" stop-opacity="0"/>
              </radialGradient>
            </defs>
            <rect width="400" height="260" fill="#0a0e17" rx="10"/>
            <g id="vizRings" opacity="0.25"></g>
            <path id="vizSpiralPath" fill="none" stroke="#00f5a0" stroke-width="1.5" opacity="0.35"/>
            <g id="vizShell"></g>
            <g id="vizOrbs"></g>
            <circle id="vizCore" cx="200" cy="130" r="8" fill="url(#shellGrad)"/>
          </svg>
        </div>
      </aside>
    </main>

    <footer class="app-footer">
      <p>HTML5 &middot; CSS3 &middot; JavaScript &middot; SVG &middot; Web Audio API</p>
    </footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
